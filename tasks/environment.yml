---
# ─── System PATH Updates ──────────────────────────────────────────────────────
# win_path is idempotent by default — only adds entry if not already present
# Note: Chocolatey tools are already on PATH via C:\ProgramData\chocolatey\bin
# We only need to add custom/non-Choco paths here

- name: Add C:\Tools to system PATH
  ansible.windows.win_path:
    elements: "{{ ludus_maldev_tools_dir }}"
    scope: machine
    state: present

# ─── Broadcast Environment Change to Running Processes ───────────────────────

- name: Broadcast WM_SETTINGCHANGE to refresh environment variables
  ansible.windows.win_powershell:
    script: |
      Add-Type -TypeDefinition @"
      using System;
      using System.Runtime.InteropServices;
      public class WinEnv {
        [DllImport("user32.dll", SetLastError=true, CharSet=CharSet.Auto)]
        public static extern IntPtr SendMessageTimeout(
          IntPtr hWnd, uint Msg, UIntPtr wParam,
          string lParam, uint fuFlags, uint uTimeout, out UIntPtr lpdwResult);
        public const int HWND_BROADCAST = 0xFFFF;
        public const int WM_SETTINGCHANGE = 0x001A;
        public const int SMTO_ABORTIFHUNG = 0x0002;
      }
      "@
      $result = [UIntPtr]::Zero
      [WinEnv]::SendMessageTimeout(
        [IntPtr][WinEnv]::HWND_BROADCAST,
        [WinEnv]::WM_SETTINGCHANGE,
        [UIntPtr]::Zero,
        "Environment",
        [WinEnv]::SMTO_ABORTIFHUNG,
        5000,
        [ref]$result
      ) | Out-Null
      $Ansible.Changed = $false
