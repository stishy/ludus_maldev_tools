      chocolatey.chocolatey.win_chocolatey:
        name: rust
        state: present
  rescue:
    - name: "WARNING: Rust installation failed — continuing"
      ansible.builtin.debug:
        msg: "{{ ansible_failed_result.msg | default('Unknown error during Rust install') }}"

# ─── Nim ──────────────────────────────────────────────────────────────────────

- name: Install Nim
  block:
    - name: Install Nim via Chocolatey
      chocolatey.chocolatey.win_chocolatey:
        name: nim
