# ─── WinDbg (Windows Debugger) ───────────────────────────────────────────────
# Modern WinDbg Preview is Store-only; install legacy WinDbg via Choco.
# Skip if WDK already installed the debugger tools.

- name: Install WinDbg
  block:
    - name: Check if WinDbg already present from WDK
      ansible.windows.win_stat:
        path: "C:\\Program Files (x86)\\Windows Kits\\10\\Debuggers\\x64\\windbg.exe"
      register: windbg_wdk_check

    - name: Install WinDbg via Chocolatey (if not already present from WDK)
      chocolatey.chocolatey.win_chocolatey:
        name: windbg
        state: present
      when: not windbg_wdk_check.stat.exists
  rescue:
    - name: "WARNING: WinDbg installation failed — continuing"
      ansible.builtin.debug:
        msg: "{{ ansible_failed_result.msg | default('Unknown error during WinDbg install') }}"


