---
# ─── PE-bear ──────────────────────────────────────────────────────────────────

- name: Install PE-bear
  block:
    - name: Install PE-bear via Chocolatey
      chocolatey.chocolatey.win_chocolatey:
        name: pebear
        state: present
  rescue:
    - name: "WARNING: PE-bear installation failed — continuing"
      ansible.builtin.debug:
        msg: "{{ ansible_failed_result.msg | default('Unknown error during PE-bear install') }}"

# ─── x64dbg ──────────────────────────────────────────────────────────────────

- name: Install x64dbg
  block:
    - name: Install x64dbg via Chocolatey
      chocolatey.chocolatey.win_chocolatey:
        name: x64dbg.portable
        state: present
  rescue:
    - name: "WARNING: x64dbg installation failed — continuing"
      ansible.builtin.debug:
        msg: "{{ ansible_failed_result.msg | default('Unknown error during x64dbg install') }}"

# ─── System Informer (formerly Process Hacker) ───────────────────────────────

- name: Install System Informer
  block:
    - name: Install System Informer via Chocolatey
      chocolatey.chocolatey.win_chocolatey:
        name: systeminformer
        state: present
  rescue:
    - name: "WARNING: System Informer not available — trying Process Hacker fallback"
      ansible.builtin.debug:
        msg: "{{ ansible_failed_result.msg | default('systeminformer package unavailable') }}"

- name: Install Process Hacker (fallback)
  block:
    - name: Check if System Informer install succeeded
      ansible.windows.win_stat:
        path: "C:\\Program Files\\SystemInformer\\SystemInformer.exe"
      register: systeminformer_installed

    - name: Install Process Hacker via Chocolatey (fallback)
      chocolatey.chocolatey.win_chocolatey:
        name: processhacker
        state: present
      when: not systeminformer_installed.stat.exists
  rescue:
    - name: "WARNING: Process Hacker installation also failed — continuing"
      ansible.builtin.debug:
        msg: "{{ ansible_failed_result.msg | default('Unknown error during Process Hacker install') }}"

