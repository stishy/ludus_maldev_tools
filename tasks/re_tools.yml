# ─── OpenJDK 21 (required by Ghidra) ─────────────────────────────────────────

- name: Install OpenJDK 21
  block:
    - name: Install OpenJDK 21 via Chocolatey
      chocolatey.chocolatey.win_chocolatey:
        name: openjdk
        version: "21.0.2"
        state: present

    - name: Find OpenJDK 21 install directory
      ansible.windows.win_find:
        paths: "C:\\Program Files\\OpenJDK"
        patterns: "jdk-21*"
        file_type: directory
        recurse: false
      register: openjdk_dir_find

    - name: Set JAVA_HOME environment variable
      ansible.windows.win_environment:
        name: JAVA_HOME
        value: "{{ openjdk_dir_find.files[0].path }}"
        level: machine
        state: present
      when: openjdk_dir_find.files | length > 0

    - name: Add OpenJDK bin to system PATH
      ansible.windows.win_path:
        elements: "{{ openjdk_dir_find.files[0].path }}\\bin"
        scope: machine
        state: present
      when: openjdk_dir_find.files | length > 0

    - name: Debug JAVA_HOME set
      ansible.builtin.debug:
        msg: "JAVA_HOME set to: {{ openjdk_dir_find.files[0].path | default('not found') }}"
  rescue:
    - name: "WARNING: OpenJDK 21 installation failed — continuing"
      ansible.builtin.debug:
        msg: "{{ ansible_failed_result.msg | default('Unknown error during OpenJDK 21 install') }}"

