---
# ─── Desktop Shortcuts (Public Desktop — available to all users) ─────────────
# community.windows.win_shortcut is naturally idempotent
# NOTE: VS Code shortcut is intentionally omitted — Chocolatey's vscode package
# already creates "Visual Studio Code.lnk" on the Public Desktop automatically.

# ─── PE-bear (Chocolatey portable) ───────────────────────────────────────────

- name: Find PE-bear executable
  ansible.windows.win_find:
    paths:
      - "C:\\ProgramData\\chocolatey\\lib\\pebear\\tools"
      - "C:\\ProgramData\\chocolatey\\bin"
    patterns: "PE-bear.exe"
    recurse: true
  register: pebear_exe_find
  failed_when: false

- name: Create PE-bear desktop shortcut
  community.windows.win_shortcut:
    src: "{{ pebear_exe_find.files[0].path }}"
    dest: "C:\\Users\\Public\\Desktop\\PE-bear.lnk"
    description: "PE-bear PE file analysis tool"
  when: pebear_exe_find.files | length > 0
  failed_when: false

