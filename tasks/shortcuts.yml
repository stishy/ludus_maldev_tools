# ─── Ghidra ──────────────────────────────────────────────────────────────────
# Ghidra is launched via a wrapper cmd that reads JAVA_HOME from the registry.
# This is necessary because explorer.exe often doesn't reload JAVA_HOME from
# WM_SETTINGCHANGE, causing 'java command could not be found' errors on launch.

- name: Find Ghidra launch script
  ansible.windows.win_find:
    paths:
      - "C:\\ProgramData\\chocolatey\\lib\\ghidra"
    patterns: "ghidraRun.bat"
    recurse: true
  register: ghidra_find
  failed_when: false

- name: Create Ghidra launcher wrapper script
  ansible.windows.win_copy:
    dest: "C:\\Tools\\ghidra_launch.cmd"
    content: |
      @echo off
      for /f "tokens=2*" %%a in ('reg query "HKLM\SYSTEM\CurrentControlSet\Control\Session Manager\Environment" /v JAVA_HOME 2^>nul') do set "JAVA_HOME=%%b"
      if defined JAVA_HOME (
        set "PATH=%JAVA_HOME%\bin;%PATH%"
      )
      call "{{ ghidra_find.files[0].path }}"
  when: ghidra_find.files | length > 0
  failed_when: false

- name: Create Ghidra desktop shortcut (via launcher wrapper)
  community.windows.win_shortcut:
    src: "C:\\Windows\\System32\\cmd.exe"
    args: "/c C:\\Tools\\ghidra_launch.cmd"
    dest: "C:\\Users\\Public\\Desktop\\Ghidra.lnk"
    description: "Ghidra Software Reverse Engineering Suite"
    windowstyle: minimized
  when: ghidra_find.files | length > 0
  failed_when: false

