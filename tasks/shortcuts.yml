# ─── Defender Toggle Scripts ───────────────────────────────────────────────────

- name: Deploy Enable-Defender.ps1 to C:\Tools
  ansible.windows.win_copy:
    src: Enable-Defender.ps1
    dest: "C:\\Tools\\Enable-Defender.ps1"
  failed_when: false

- name: Deploy Test-VSCodeExtensions.ps1 to C:\Tools
  ansible.windows.win_copy:
    src: Test-VSCodeExtensions.ps1
    dest: "C:\\Tools\\Test-VSCodeExtensions.ps1"
  failed_when: false

- name: Deploy Disable-Defender.ps1 to C:\Tools
  ansible.windows.win_copy:
    src: Disable-Defender.ps1
    dest: "C:\\Tools\\Disable-Defender.ps1"
  failed_when: false

- name: Create Enable-Defender desktop shortcut (runs as Admin)
  community.windows.win_shortcut:
    src: "C:\\Windows\\System32\\WindowsPowerShell\\v1.0\\powershell.exe"
    dest: "C:\\Users\\Public\\Desktop\\Enable-Defender.lnk"
    args: "-ExecutionPolicy Bypass -File C:\\Tools\\Enable-Defender.ps1"
    description: "Re-enable Defender/AMSI/Firewall (for YARA/ThreatCheck testing)"
    run_as_admin: true
  failed_when: false

- name: Create Disable-Defender desktop shortcut (runs as Admin)
  community.windows.win_shortcut:
    src: "C:\\Windows\\System32\\WindowsPowerShell\\v1.0\\powershell.exe"
    dest: "C:\\Users\\Public\\Desktop\\Disable-Defender.lnk"
    args: "-ExecutionPolicy Bypass -File C:\\Tools\\Disable-Defender.ps1"
    description: "Disable Defender/AMSI/Firewall (maldev mode)"
    run_as_admin: true
  failed_when: false
